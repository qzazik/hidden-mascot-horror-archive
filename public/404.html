<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/404\.html$/, '/');
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        var normalized = path.replace(/\/$/, '');
        var redirectPath = normalized || '/';
        var target = path + '?redirect=' + encodeURIComponent(redirectPath + search + hash);
        window.location.replace(target);
      })();
    </script>
    <title>Hidden Mascot Horror Archive</title>
  </head>
  <body></body>
</html>
